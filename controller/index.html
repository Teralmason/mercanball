<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MercanBall Controller</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; margin: 0; overflow: hidden; touch-action: none; }
        .login-box { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 10px; }
        input { padding: 12px; border-radius: 8px; border: 2px solid #333; width: 60%; background: #222; color: white; text-align: center; font-size: 16px; }
        .btn-join { background: #00ff88; color: black; font-weight: bold; padding: 15px 40px; border-radius: 10px; border: none; font-size: 18px; cursor: pointer; }
        
        #gamepad { display: none; height: 100vh; width: 100vw; position: relative; background: #0f0f0f; }
        
        /* Ekranı ikiye böldük: Sol joystick, sağ vuruş */
        #joystick-zone { position: absolute; left: 0; top: 0; width: 50%; height: 100%; }
        #kick-zone { position: absolute; right: 0; top: 0; width: 50%; height: 100%; display: flex; align-items: center; justify-content: center; }
        
        /* Vur butonu: Tam ortaya ve ele oturacak büyüklükte */
        .kick-btn { 
            width: 160px; height: 160px; 
            background: radial-gradient(circle, #ff4b2b, #cc3a21); 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            font-weight: 900; font-size: 32px; border: 8px solid rgba(255,255,255,0.1);
            box-shadow: 0 0 40px rgba(255,75,43,0.3);
            user-select: none; -webkit-user-select: none;
            transition: transform 0.1s;
        }
        .kick-btn:active { transform: scale(0.9) brightness(1.2); }

        /* Orta çizgi (Görsel rehber) */
        .divider { position: absolute; left: 50%; top: 20%; bottom: 20%; width: 2px; background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <div id="login" class="login-box">
        <h2 style="color:#00ff88; margin:0;">MERCANBALL</h2>
        <p style="font-size: 12px; color: #666;">Yatay çevir ve Bağlan'a bas</p>
        <input type="text" id="nick" placeholder="NİCK">
        <input type="number" id="num" placeholder="FORMA NO">
        <input type="number" id="room" placeholder="ODA KODU">
        <button class="btn-join" onclick="initAndJoin()">BAĞLAN</button>
    </div>

    <div id="gamepad">
        <div class="divider"></div>
        <div id="joystick-zone"></div>
        <div id="kick-zone">
            <div class="kick-btn" id="kickBtn">VUR</div>
        </div>
    </div>

    <script>
        const peer = new Peer();
        let conn;

        async function initAndJoin() {
            // 1. Tam Ekran ve Yön Kilidi Denemesi
            try {
                if (document.documentElement.requestFullscreen) {
                    await document.documentElement.requestFullscreen();
                }
                if (screen.orientation && screen.orientation.lock) {
                    await screen.orientation.lock('landscape').catch(e => console.log("Yön kilidi hatası:", e));
                }
            } catch (err) {
                console.log("Full screen hatası:", err);
            }

            joinGame();
        }

        function joinGame() {
            const nick = document.getElementById('nick').value || "Emin";
            const num = document.getElementById('num').value || "10";
            const room = document.getElementById('room').value;
            
            if(!room) { alert("Oda kodu lazım bilader!"); return; }

            conn = peer.connect("mercan-" + room);
            conn.on('open', () => {
                document.getElementById('login').style.display = 'none';
                document.getElementById('gamepad').style.display = 'block';
                conn.send({ type: 'join', nick: nick, num: num });
                setupControls();
            });

            conn.on('error', err => alert("Bağlantı patladı: " + err));
        }

        function setupControls() {
            // Joystick Ayarları: Tam sol elin baş parmağına gelecek şekilde ortalandı
            nipplejs.create({
                zone: document.getElementById('joystick-zone'),
                mode: 'static', 
                position: { left: '50%', top: '50%' }, // Zone içindeki konumu
                color: '#00ff88', 
                size: 150, // Biraz büyüttüm daha iyi hissedilsin diye
                threshold: 0.1
            }).on('move', (e, d) => {
                if(conn && d.vector) conn.send({ type: 'move', x: d.vector.x, y: -d.vector.y });
            }).on('end', () => conn.send({ type: 'move', x: 0, y: 0 }));

            const btn = document.getElementById('kickBtn');
            
            const startKick = (e) => { 
                e.preventDefault(); 
                if(conn) conn.send({ type: 'kick', value: true }); 
            };
            const stopKick = (e) => { 
                e.preventDefault(); 
                if(conn) conn.send({ type: 'kick', value: false }); 
            };

            btn.addEventListener('touchstart', startKick);
            btn.addEventListener('touchend', stopKick);
            btn.addEventListener('mousedown', startKick);
            btn.addEventListener('mouseup', stopKick);
        }
    </script>
</body>
</html>

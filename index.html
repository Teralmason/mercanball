<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MercanBall</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root {
            --neon-green: #00ff88;
            --red: #ff3333;
            --blue: #33aaff;
            --bg: #0a0a0a;
            --panel-bg: #151515;
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            height: 100vh; 
        }
        
        /* SOL PANEL */
        #sidebar { 
            width: 340px; 
            background: var(--panel-bg); 
            border-right: 3px solid var(--neon-green); 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            z-index: 100;
            overflow-y: auto;
        }

        /* OYUN ALANI */
        #game-area { 
            flex-grow: 1; 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: radial-gradient(circle, #1a1a1a 0%, #050505 100%);
            padding: 20px;
        }

        canvas { 
            background: #1b3d1b; 
            border: 4px solid rgba(255,255,255,0.1);
            border-radius: 12px; 
            max-width: 100%;
            max-height: 100%;
            aspect-ratio: 1100 / 600;
            object-fit: contain;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* YENİ NESİL SKORBOARD */
        .scoreboard-container {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            background: #222;
            border: 2px solid #444;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 50;
        }

        .team-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 5px 20px;
            min-width: 80px;
        }

        .score-display {
            font-family: 'Courier New', monospace;
            font-size: 42px;
            font-weight: 900;
        }

        .manual-ctrl {
            display: flex;
            gap: 10px;
            margin-top: 2px;
        }

        .adj-btn {
            background: #333;
            border: 1px solid #555;
            color: white;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 12px;
            border-radius: 3px;
        }
        .adj-btn:hover { background: #444; }

        /* MODAL VE EKRAN ÜSTÜ YAZILAR */
        #countdown { 
            position: absolute; font-size: 180px; font-weight: 900; 
            color: white; text-shadow: 0 0 50px rgba(0,0,0,0.9); 
            display: none; z-index: 50; pointer-events: none;
        }
        
        #goal-overlay { 
            position: absolute; background: rgba(0,0,0,0.95); 
            padding: 50px 100px; border-radius: 30px; 
            font-size: 80px; font-weight: 900; color: var(--neon-green); 
            transform: scale(0); transition: 0.5s; 
            z-index: 200; text-align: center; border: 5px solid var(--neon-green); 
        }
        #goal-overlay.active { transform: scale(1); }

        /* UI BUTONLAR */
        .btn { 
            background: var(--neon-green); color: black; border: none; 
            padding: 12px; border-radius: 8px; cursor: pointer; 
            font-weight: 900; transition: 0.2s; text-transform: uppercase;
        }
        .btn:hover { transform: scale(1.02); filter: brightness(1.1); }
        .btn-reset { background: #444; color: white; }

        /* OYUNCU KARTLARI */
        .player-card {
            background: #222;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #555;
            margin-bottom: 8px;
        }
        .p-info { display: flex; flex-direction: column; }
        .p-name { font-weight: bold; font-size: 14px; }
        .p-team { font-size: 11px; color: #888; }
        
        .p-actions { display: flex; gap: 5px; }
        .act-btn {
            padding: 5px 8px;
            font-size: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            color: white;
        }
        .btn-swap { background: #555; }
        .btn-kick { background: var(--red); }
    </style>
</head>
<body>
    <div id="sidebar">
        <h1 style="color:var(--neon-green); margin:0; font-size: 24px; text-align: center;">MERCANBALL</h1>
        <div id="room-id" style="background:#222; padding:10px; border-radius:8px; text-align:center; font-family: monospace; color: var(--neon-green);">ODA: ...</div>
        
        <button class="btn" onclick="startMatch()">MAÇI BAŞLAT</button>
        <button class="btn btn-reset" onclick="resetPositions()">POZİSYONLARI SIFIRLA</button>

        <div style="margin-top: 10px;">
            <h4 style="margin: 0 0 10px 0; color: #666; font-size: 11px; text-transform: uppercase;">Saha Yönetimi</h4>
            <div id="player-list"></div>
        </div>
    </div>

    <div id="game-area">
        <div id="countdown">3</div>
        <div id="goal-overlay">Gol akk<br><span id="scorer-name" style="font-size:30px; color:white;"></span></div>
        
        <div class="scoreboard-container">
            <div class="team-box" style="background: rgba(255, 51, 51, 0.1);">
                <span style="color: var(--red); font-weight: 900; font-size: 12px;">ÜNLÜLER</span>
                <span class="score-display" id="score-red" style="color: var(--red);">0</span>
                <div class="manual-ctrl">
                    <button class="adj-btn" onclick="manualScore('red', 1)">+</button>
                    <button class="adj-btn" onclick="manualScore('red', -1)">-</button>
                </div>
            </div>
            <div style="width: 2px; background: #444; margin: 10px 0;"></div>
            <div class="team-box" style="background: rgba(51, 170, 255, 0.1);">
                <span style="color: var(--blue); font-weight: 900; font-size: 12px;">GÖNÜLLÜLER</span>
                <span class="score-display" id="score-blue" style="color: var(--blue);">0</span>
                <div class="manual-ctrl">
                    <button class="adj-btn" onclick="manualScore('blue', 1)">+</button>
                    <button class="adj-btn" onclick="manualScore('blue', -1)">-</button>
                </div>
            </div>
        </div>

        <canvas id="game"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        canvas.width = 1100; canvas.height = 600;

        const shortId = Math.floor(1000 + Math.random() * 9000).toString();
        const peer = new Peer("mercan-" + shortId);
        
        let players = {};
        let conns = {}; // Aktif bağlantıları tutmak için
        let ball = { x: 550, y: 300, dx: 0, dy: 0, radius: 10, lastTouch: null };
        let score = { red: 0, blue: 0 };
        let isPaused = false;

        const FRICTION = 0.98; 
        const KICK_POWER = 13;
        const field = { left: 50, right: 1050, top: 50, bottom: 550 };
        const posts = [{x: 50, y: 220}, {x: 50, y: 380}, {x: 1050, y: 220}, {x: 1050, y: 380}];

        peer.on('open', () => document.getElementById('room-id').innerText = "ODA: " + shortId);

        peer.on('connection', conn => {
            conns[conn.peer] = conn;
            conn.on('data', data => {
                if(data.type === 'join') {
                    players[conn.peer] = {
                        nick: data.nick, number: data.num || "7",
                        team: Object.keys(players).length % 2 === 0 ? 'red' : 'blue',
                        x: 0, y: 0, dx: 0, dy: 0, isKicking: false, radius: 20
                    };
                    resetPositions();
                    updateUI();
                }
                if(data.type === 'move' && players[conn.peer] && !isPaused) {
                    players[conn.peer].targetDx = data.x * 4.5;
                    players[conn.peer].targetDy = data.y * 4.5;
                }
                if(data.type === 'kick' && players[conn.peer]) {
                    players[conn.peer].isKicking = data.value;
                }
            });
            conn.on('close', () => { 
                delete players[conn.peer]; 
                delete conns[conn.peer];
                updateUI(); 
            });
        });

        // --- ADMIN FONKSİYONLARI ---
        function manualScore(team, val) {
            score[team] = Math.max(0, score[team] + val);
            updateUI();
        }

        function swapTeam(id) {
            if(players[id]) {
                players[id].team = players[id].team === 'red' ? 'blue' : 'red';
                updateUI();
                resetPositions();
            }
        }

        function kickPlayer(id) {
            if(conns[id]) conns[id].close();
            delete players[id];
            updateUI();
        }

        function startMatch() {
            score = { red: 0, blue: 0 };
            updateUI();
            runCountdown();
        }

        function runCountdown() {
            isPaused = true;
            resetPositions();
            let count = 3;
            const cd = document.getElementById('countdown');
            cd.style.display = 'block';
            const timer = setInterval(() => {
                cd.innerText = count;
                if(count <= 0) {
                    clearInterval(timer);
                    cd.style.display = 'none';
                    isPaused = false;
                }
                count--;
            }, 1000);
        }

        function resetPositions() {
            ball = { x: 550, y: 300, dx: 0, dy: 0, radius: 10, lastTouch: null };
            for(let id in players) {
                players[id].dx = 0; players[id].dy = 0;
                players[id].targetDx = 0; players[id].targetDy = 0;
            }
            let reds = Object.values(players).filter(p => p.team === 'red');
            let blues = Object.values(players).filter(p => p.team === 'blue');
            reds.forEach((p, i) => { p.x = 250; p.y = 300 + (i * 70 * (i % 2 === 0 ? 1 : -1)); });
            blues.forEach((p, i) => { p.x = 850; p.y = 300 + (i * 70 * (i % 2 === 0 ? 1 : -1)); });
        }

        function triggerGoal(team) {
            if(isPaused) return;
            isPaused = true;
            score[team]++;
            updateUI();
            const overlay = document.getElementById('goal-overlay');
            document.getElementById('scorer-name').innerText = ball.lastTouch || "KENDİ KALESİNE!";
            overlay.classList.add('active');
            setTimeout(() => {
                overlay.classList.remove('active');
                runCountdown();
            }, 2500);
        }

        function updateUI() {
            document.getElementById('score-red').innerText = score.red;
            document.getElementById('score-blue').innerText = score.blue;
            const list = document.getElementById('player-list');
            list.innerHTML = Object.entries(players).map(([id, p]) => `
                <div class="player-card" style="border-left-color: ${p.team==='red'?'var(--red)':'var(--blue)'}">
                    <div class="p-info">
                        <span class="p-name">${p.nick} (#${p.number})</span>
                        <span class="p-team">${p.team.toUpperCase()} TEAM</span>
                    </div>
                    <div class="p-actions">
                        <button class="act-btn btn-swap" onclick="swapTeam('${id}')">TAKIM</button>
                        <button class="act-btn btn-kick" onclick="kickPlayer('${id}')">AT</button>
                    </div>
                </div>
            `).join("");
        }

        function drawField() {
            ctx.fillStyle = "#1b3d1b"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "rgba(255,255,255,0.1)"; ctx.lineWidth = 2;
            for(let i=0; i<canvas.width; i+=80) { ctx.strokeRect(i, 0, 40, canvas.height); }
            ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.lineWidth = 4;
            ctx.strokeRect(field.left, field.top, field.right-field.left, field.bottom-field.top);
            ctx.beginPath(); ctx.moveTo(550, 50); ctx.lineTo(550, 550); ctx.stroke();
            ctx.beginPath(); ctx.arc(550, 300, 90, 0, Math.PI*2); ctx.stroke();
            ctx.lineWidth = 10;
            ctx.strokeStyle = "#ff3333"; ctx.strokeRect(0, 220, 50, 160);
            ctx.strokeStyle = "#33aaff"; ctx.strokeRect(1050, 220, 50, 160);
            ctx.fillStyle = "white";
            posts.forEach(p => { ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, Math.PI*2); ctx.fill(); });
        }

        function loop() {
            drawField();
            if(!isPaused) {
                ball.x += ball.dx; ball.y += ball.dy;
                ball.dx *= FRICTION; ball.dy *= FRICTION;
                if(ball.y < field.top + ball.radius || ball.y > field.bottom - ball.radius) {
                    ball.dy *= -0.8;
                    ball.y = ball.y < field.top + ball.radius ? field.top + ball.radius : field.bottom - ball.radius;
                }
                if(ball.y > 220 && ball.y < 380) {
                    if(ball.x < 20) triggerGoal('blue');
                    if(ball.x > 1080) triggerGoal('red');
                } else if(ball.x < field.left + ball.radius || ball.x > field.right - ball.radius) {
                    ball.dx *= -0.8;
                    ball.x = ball.x < field.left + ball.radius ? field.left + ball.radius : field.right - ball.radius;
                }
                posts.forEach(p => {
                    let d = Math.hypot(ball.x - p.x, ball.y - p.y);
                    if(d < ball.radius + 8) {
                        let angle = Math.atan2(ball.y - p.y, ball.x - p.x);
                        ball.dx = Math.cos(angle) * 7; ball.dy = Math.sin(angle) * 7;
                    }
                });
            }

            for(let id in players) {
                let p = players[id];
                if(!isPaused) {
                    p.x += p.targetDx || 0; p.y += p.targetDy || 0;
                    p.x = Math.max(field.left + 20, Math.min(field.right - 20, p.x));
                    p.y = Math.max(field.top + 20, Math.min(field.bottom - 20, p.y));
                }
                let d = Math.hypot(p.x - ball.x, p.y - ball.y);
                if(d < p.radius + ball.radius + 2) {
                    ball.lastTouch = p.nick;
                    let angle = Math.atan2(ball.y - p.y, ball.x - p.x);
                    if(p.isKicking) {
                        ball.dx = Math.cos(angle) * KICK_POWER; ball.dy = Math.sin(angle) * KICK_POWER;
                        p.isKicking = false;
                    } else {
                        let overlap = (p.radius + ball.radius) - d;
                        ball.x += Math.cos(angle) * (overlap + 1); ball.y += Math.sin(angle) * (overlap + 1);
                        ball.dx += (p.targetDx || 0) * 0.1; ball.dy += (p.targetDy || 0) * 0.1;
                    }
                }
                ctx.fillStyle = p.team === 'red' ? '#ff3333' : '#33aaff';
                ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = p.isKicking ? "yellow" : "white"; ctx.lineWidth = 3; ctx.stroke();
                ctx.fillStyle = "white"; ctx.font = "bold 14px Arial"; ctx.textAlign = "center";
                ctx.fillText(p.number, p.x, p.y + 5);
                ctx.font = "11px Arial"; ctx.fillText(p.nick, p.x, p.y - 32);
            }
            ctx.fillStyle = "white"; ctx.shadowBlur = 15; ctx.shadowColor = "white";
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2); ctx.fill();
            ctx.shadowBlur = 0;
            requestAnimationFrame(loop);
        }
        updateUI(); loop();
    </script>
</body>
</html>
